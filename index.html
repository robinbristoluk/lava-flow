<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lava-flow</title>
    <script type="module" src="/src/index.ts"></script>
    <style>
      body {
        align-items: start;
        background: #f5f3ff;
        display: grid;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        justify-items: center;
        margin: 0;
        min-height: 100svh;
        padding: 2rem 1rem;
      }

      main {
        max-width: 28rem;
        width: 100%;
      }

      .stack {
        display: grid;
        gap: 1.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="stack">
        <lf-form-field
          label="Email address"
          name="email"
          type="email"
          placeholder="you@example.com"
          hint="We'll never share your email."
          required
        ></lf-form-field>
        <lf-form-field
          label="Full name"
          name="fullname"
          type="text"
          placeholder="John Smith"
          error="Please enter your full name."
        ></lf-form-field>
        <lf-form-field
          label="Phone number"
          name="phone"
          type="tel"
          placeholder="+44 7700 900000"
          disabled
        ></lf-form-field>
      </div>
    </main>
  </body>
</html>
