<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lava-flow</title>
    <script type="module" src="/src/index.ts"></script>
    <style>
      :root {
        --lf-color-primary: #6d28d9;
        --lf-color-primary-hover: #5b21b6;
        --lf-color-focus-ring: #581c87;
      }

      body {
        align-items: center;
        background: #f5f3ff;
        display: grid;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        min-height: 100svh;
        padding: 1rem;
      }

      main {
        max-width: 28rem;
        width: 100%;
      }

      .stack {
        display: grid;
        gap: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="stack">
        <lf-button label="Start flow" full-width>
          <span slot="icon">🔥</span>
        </lf-button>
        <lf-button variant="secondary" label="Secondary action" full-width></lf-button>
      </div>
    </main>
  </body>
</html>
